weights:
  recency: 0.30
  source_trust: 0.15
  trending: 0.35
  keyword_boost: 0.20

recency:
  half_life_hours: 6
  decay_constant: 0.693

# Source trust based on monthly viewer statistics (SimilarWeb 2025):
# VnExpress ~180M, Tuổi Trẻ ~95M, Thanh Niên ~75M, Dân Trí ~65M, 24h ~55M
source_trust:
  VnExpress: 1.0
  VnExpress Thời sự: 1.0
  VnExpress Thể thao: 1.0
  Tuổi Trẻ: 0.85
  Tuổi Trẻ Thể thao: 0.85
  Thanh Niên: 0.75
  Dân Trí: 0.65
  VnEconomy: 0.60
  24h: 0.55
  NewsAPI: 0.50
  default: 0.40

trending:
  similarity_threshold: 0.4
  min_sources: 2
  max_source_divisor: 3

